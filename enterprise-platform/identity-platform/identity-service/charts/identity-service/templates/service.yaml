apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-identity-service
  namespace: {{ .Release.Namespace | default "platform" }}
  labels:
    app.kubernetes.io/name: identity-service
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 8080
    name: http
  selector:
    app: {{ .Release.Name }}-identity-service
