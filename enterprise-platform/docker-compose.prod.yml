version: '3.8'

# =============================================================================
# NEXUSCORE ENTERPRISE PRODUCTION CONTAINER COMPOSITION
# Implements multi-stage execution, strict network segregation,
# non-root contexts, read-only root filesystems, and explicit resource limits.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # CORE STORAGE LAYER (No host port exposure, accessible only via data-network)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: nexuscore-prod-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PROD_PASSWORD}
      POSTGRES_DB: nexuscore_enterprise
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M
        reservations:
          cpus: '0.5'
          memory: 1024M
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexuscore-prod-redis
    command: redis-server --requirepass ${REDIS_PROD_PASSWORD} --appendonly yes
    volumes:
      - redisdata_prod:/data
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2048M
        reservations:
          cpus: '0.25'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PROD_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # DISTRIBUTED BROKER LAYER
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: nexuscore-prod-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: nexuscore-prod-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - data-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # MICROSERVICE APPLICATION LAYER (Using secure distroless runtime images)
  # ---------------------------------------------------------------------------
  api-gateway:
    image: nexuscore/api-gateway:latest
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: nexuscore-prod-api-gateway
    ports:
      - "80:8080" # Exposed externally
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:8081
      - COMPUTE_SERVICE_URL=http://compute-engine:8082
      - JAEGER_URL=http://jaeger:4317
      - ENVIRONMENT=production
    networks:
      - frontend-network
      - internal-network
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  auth-service:
    image: nexuscore/auth-service:latest
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: nexuscore-prod-auth-service
    environment:
      - PORT=8081
      - DB_DSN=postgres://postgres:${DB_PROD_PASSWORD}@postgres:5432/nexuscore_enterprise?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASS=${REDIS_PROD_PASSWORD}
      - JWT_SECRET=${JWT_PROD_SECRET}
      - JAEGER_URL=http://jaeger:4317
    networks:
      - internal-network
      - data-network
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  compute-engine:
    image: nexuscore/compute-engine:latest
    build:
      context: ./compute-engine
      dockerfile: Dockerfile
    container_name: nexuscore-prod-compute-engine
    environment:
      - PORT=8082
      - DB_DSN=postgres://postgres:${DB_PROD_PASSWORD}@postgres:5432/nexuscore_enterprise?sslmode=disable
      - KAFKA_BROKERS=kafka:29092
      - JAEGER_URL=http://jaeger:4317
    networks:
      - internal-network
      - data-network
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  frontend-network:
    driver: bridge
  internal-network:
    driver: bridge
    internal: true # Private network, no internet ingress
  data-network:
    driver: bridge
    internal: true # Deep private storage network

volumes:
  pgdata_prod:
  redisdata_prod:
