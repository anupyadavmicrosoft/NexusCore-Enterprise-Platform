# Helm values for NexusCore Auth Service (Zero-Trust Identity platform)
replicaCount: 3

nameOverride: "auth-service"
appLabel: "auth-service"

priorityClassName: "nexuscore-high"

image:
  repository: gcr.io/nexuscore-prod/auth-service
  tag: v1.0.0
  pullPolicy: IfNotPresent

service:
  port: 8081
  targetPort: 8081

ingress:
  enabled: false # Auth Service is behind API gateway, no public ingress allowed

config:
  PORT: "8081"
  REDIS_ADDR: "redis-master.nexuscore-data.svc.cluster.local:6379"
  JAEGER_URL: "http://jaeger-collector.nexuscore-system.svc.cluster.local:4317"

secrets:
  # Simulated secrets (in real prod, references SealedSecrets, ExternalSecrets or secret inject tools)
  DB_DSN: "postgres://postgres:enterprise_prod_db_sec_pass_88@postgres-primary.nexuscore-data.svc.cluster.local:5432/nexuscore_enterprise?sslmode=disable"
  REDIS_PASS: "redis_prod_auth_secret_hash_value_99"
  JWT_SECRET: "jwt_asymmetric_rs256_private_key_signature_hash_data_block"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

containerPorts:
  - name: http
    containerPort: 8081
    protocol: TCP

livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

networkPolicy:
  enabled: true
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: nexuscore-data
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379

monitoring:
  serviceMonitor:
    enabled: true
    interval: 15s
    path: /metrics
    port: http
  prometheusRule:
    enabled: true
    rules:
      - alert: AuthFailureRateSpike
        expr: rate(auth_failures_total[5m]) > 20
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Auth validation failures spiked (>20/sec) indicating brute-force or routing failure."
