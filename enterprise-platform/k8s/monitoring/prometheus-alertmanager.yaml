apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: nexuscore-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - "alertmanager.nexuscore-monitoring.svc.cluster.local:9093"

    rule_files:
      - "/etc/prometheus/alert_rules.yml"

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'otel-collector-metrics'
        static_configs:
          - targets: ['otel-collector.nexuscore-monitoring.svc.cluster.local:8889']

      # Microservices scraping
      - job_name: 'nexuscore-kubernetes-services'
        kubernetes_sd_configs:
          - role: service
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2

  alert_rules.yml: |
    groups:
      - name: NexusCoreClusterAlerts
        rules:
          - alert: ServiceHighErrorRate
            expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service) * 100 > 5
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Microservice {{ $labels.service }} is experiencing a high error rate (> 5%)"
              description: "High volume of HTTP 5xx errors recorded over the last 5 minutes."

          - alert: HostMemoryExhaustion
            expr: node_memory_Active_bytes / node_memory_MemTotal_bytes * 100 > 90
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory utilization detected on GKE worker node"

          - alert: ServiceUnavailable
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service replica is down"
              description: "Exporter target has been offline for more than 1 minute."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: nexuscore-monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.49.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: nexuscore-monitoring
  labels:
    app: prometheus
spec:
  ports:
    - port: 9090
      targetPort: 9090
      name: web
  selector:
    app: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: nexuscore-monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'ops-email'
      routes:
        - match:
            severity: critical
          receiver: 'oncall-pagerduty'

    receivers:
      - name: 'ops-email'
        email_configs:
          - to: 'ops@nexuscore-enterprise.com'
            from: 'alertmanager@nexuscore-enterprise.com'
            smarthost: 'smtp.nexuscore-enterprise.com:25'
            require_tls: false

      - name: 'oncall-pagerduty'
        pagerduty_configs:
          - service_key: 'nexuscore_pagerduty_prod_service_key_hash'
            severity: 'critical'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: nexuscore-monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - containerPort: 9093
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: nexuscore-monitoring
  labels:
    app: alertmanager
spec:
  ports:
    - port: 9093
      targetPort: 9093
      name: http
  selector:
    app: alertmanager
