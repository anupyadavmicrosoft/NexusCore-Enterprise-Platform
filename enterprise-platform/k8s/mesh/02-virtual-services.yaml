apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: api-gateway-ingress-vs
  namespace: nexuscore-prod
spec:
  hosts:
  - "api.nexuscore-enterprise.com"
  gateways:
  - nexuscore-ingress-gateway
  http:
  # Route traffic to Auth Service path prefix
  - match:
    - uri:
        prefix: /api/v1/auth
    route:
    - destination:
        host: auth-service.nexuscore-prod.svc.cluster.local
        subset: stable
      weight: 90
    - destination:
        host: auth-service.nexuscore-prod.svc.cluster.local
        subset: canary
      weight: 10
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: "5xx,connect-failure,refused-stream"
    timeout: 5s

  # Route traffic to Compute & Balance Engine path prefix
  - match:
    - uri:
        prefix: /api/v1/compute
    route:
    - destination:
        host: compute-engine.nexuscore-prod.svc.cluster.local
        subset: stable
      weight: 90
    - destination:
        host: compute-engine.nexuscore-prod.svc.cluster.local
        subset: canary
      weight: 10
    retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: "5xx,connect-failure,refused-stream"
    timeout: 30s

  # Fallback: General API Gateway traffic
  - route:
    - destination:
        host: api-gateway.nexuscore-prod.svc.cluster.local
        subset: stable
      weight: 90
    - destination:
        host: api-gateway.nexuscore-prod.svc.cluster.local
        subset: canary
      weight: 10
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: "5xx,connect-failure,refused-stream"
    timeout: 5s
---
# Egress routing for Stripe API - Inside Mesh to Egress Gateway
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: stripe-egress-vs
  namespace: nexuscore-prod
spec:
  hosts:
  - "api.stripe.com"
  gateways:
  - mesh # Apply inside the mesh
  - nexuscore-egress-gateway # Apply on the egress gateway
  http:
  - match:
    - gateways:
      - mesh
      port: 80
    route:
    - destination:
        host: istio-egressgateway.istio-system.svc.cluster.local
        port:
          number: 80
  - match:
    - gateways:
      - nexuscore-egress-gateway
      port: 80
    route:
    - destination:
        host: api.stripe.com
        port:
          number: 443
---
# Egress routing for GitHub API - Inside Mesh to Egress Gateway
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: github-egress-vs
  namespace: nexuscore-prod
spec:
  hosts:
  - "api.github.com"
  gateways:
  - mesh
  - nexuscore-egress-gateway
  http:
  - match:
    - gateways:
      - mesh
      port: 80
    route:
    - destination:
        host: istio-egressgateway.istio-system.svc.cluster.local
        port:
          number: 80
  - match:
    - gateways:
      - nexuscore-egress-gateway
      port: 80
    route:
    - destination:
        host: api.github.com
        port:
          number: 443
