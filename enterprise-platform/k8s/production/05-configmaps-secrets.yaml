apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: nexuscore-prod
data:
  ENVIRONMENT: "production"
  PORT: "8080"
  AUTH_SERVICE_URL: "http://auth-service.nexuscore-prod.svc.cluster.local:8081"
  COMPUTE_SERVICE_URL: "http://compute-engine.nexuscore-prod.svc.cluster.local:8082"
  JAEGER_URL: "http://jaeger-collector.nexuscore-system.svc.cluster.local:4317"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: nexuscore-prod
data:
  PORT: "8081"
  REDIS_ADDR: "redis-master.nexuscore-data.svc.cluster.local:6379"
  JAEGER_URL: "http://jaeger-collector.nexuscore-system.svc.cluster.local:4317"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: compute-engine-config
  namespace: nexuscore-prod
data:
  PORT: "8082"
  KAFKA_BROKERS: "kafka-0.kafka-headless.nexuscore-data.svc.cluster.local:9092,kafka-1.kafka-headless.nexuscore-data.svc.cluster.local:9092,kafka-2.kafka-headless.nexuscore-data.svc.cluster.local:9092"
  JAEGER_URL: "http://jaeger-collector.nexuscore-system.svc.cluster.local:4317"
---
# Template representing Google Secret Manager external secrets mapping or standard Secrets.
# For production environments, these are injected via SealedSecrets, HashiCorp Vault, or ExternalSecrets.
apiVersion: v1
kind: Secret
metadata:
  name: nexuscore-database-secrets
  namespace: nexuscore-prod
type: Opaque
stringData:
  # Base64 values injected dynamically at deploy-time by SRE tools
  DB_DSN: "postgres://postgres:enterprise_prod_db_sec_pass_88@postgres-primary.nexuscore-data.svc.cluster.local:5432/nexuscore_enterprise?sslmode=disable"
  REDIS_PASS: "redis_prod_auth_secret_hash_value_99"
  JWT_SECRET: "jwt_asymmetric_rs256_private_key_signature_hash_data_block"
