# Enforce a default deny-all policy for all ingress/egress traffic on prod namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: nexuscore-prod
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Enforce a default deny-all policy for all ingress/egress traffic on data namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-data
  namespace: nexuscore-data
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Allow DNS resolution egress for pods in prod namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: nexuscore-prod
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
# Allow Ingress Controller to route traffic exclusively to API Gateway on port 8080
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-gateway
  namespace: nexuscore-prod
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: nexuscore-ingress
    ports:
    - protocol: TCP
      port: 8080
---
# Allow API Gateway to route to downstream auth-service and compute-engine
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-egress
  namespace: nexuscore-prod
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: auth-service
    ports:
    - protocol: TCP
      port: 8081
  - to:
    - podSelector:
        matchLabels:
          app: compute-engine
    ports:
    - protocol: TCP
      port: 8082
---
# Allow Ingress into Auth-Service on port 8081 from API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-ingress
  namespace: nexuscore-prod
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 8081
---
# Allow Ingress into Compute-Engine on port 8082 from API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-compute-ingress
  namespace: nexuscore-prod
spec:
  podSelector:
    matchLabels:
      app: compute-engine
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 8082
---
# Allow Auth-Service egress to Postgres database and Redis cache
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-data-egress
  namespace: nexuscore-prod
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: nexuscore-data
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
---
# Allow Compute-Engine egress to Postgres database and Kafka broker
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-compute-data-egress
  namespace: nexuscore-prod
spec:
  podSelector:
    matchLabels:
      app: compute-engine
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: nexuscore-data
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 9092
---
# Allow Ingress into data layer from authorized production workloads
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-data-ingress
  namespace: nexuscore-data
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: nexuscore-prod
      podSelector:
        matchLabels:
          app: auth-service
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
  - from:
    - namespaceSelector:
        matchLabels:
          name: nexuscore-prod
      podSelector:
        matchLabels:
          app: compute-engine
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 9092
