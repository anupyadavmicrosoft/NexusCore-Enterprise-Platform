apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: nexuscore-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: nexuscore-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: compute-engine-sa
  namespace: nexuscore-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: database-sa
  namespace: nexuscore-data
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: config-reader-role
  namespace: nexuscore-prod
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-config-binding
  namespace: nexuscore-prod
subjects:
- kind: ServiceAccount
  name: api-gateway-sa
  namespace: nexuscore-prod
roleRef:
  kind: Role
  name: config-reader-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auth-service-config-binding
  namespace: nexuscore-prod
subjects:
- kind: ServiceAccount
  name: auth-service-sa
  namespace: nexuscore-prod
roleRef:
  kind: Role
  name: config-reader-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: compute-engine-config-binding
  namespace: nexuscore-prod
subjects:
- kind: ServiceAccount
  name: compute-engine-sa
  namespace: nexuscore-prod
roleRef:
  kind: Role
  name: config-reader-role
  apiGroup: rbac.authorization.k8s.io
