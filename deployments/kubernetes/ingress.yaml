# ==============================================================================
# Kubernetes Ingress Resource - NGINX Routing Configuration
# Maps host endpoints with automated SSL/TLS terminations via Cert-Manager
# ==============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexuscore-ingress
  namespace: nexus-core
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    # Cert-Manager annotation for automated Let's Encrypt TLS issuance
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    # Custom rate limiting annotations to stop volumetric DDOS attacks
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  tls:
    - hosts:
        - api.nexuscore.enterprise.com
      secretName: nexuscore-tls-certs
  rules:
    - host: api.nexuscore.enterprise.com
      http:
        paths:
          # Match standard API paths
          - path: /api/v2
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          # Match direct system monitoring targets (restricted)
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 9090
